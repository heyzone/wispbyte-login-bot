name: Wispbyte Cookie Auto Restart

on:
  schedule:
    - cron: '31 21 */3 * *'    # 每3天UTC 21点31分
  workflow_dispatch:           # 支持手动触发测试

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 5         # 逻辑简化后，5分钟绰绰有余
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet aiohttp
          echo "✅ 依赖安装完成"

      - name: Run Restart Script
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 格式必须为: 邮箱----connect.sid=s%3Axxxx
          LOGIN_ACCOUNTS: ${{ secrets.LOGIN_ACCOUNTS }}
        run: |
          echo "🚀 开始执行异步重启任务..."
          python login.py
          echo "🏁 任务结束"

  notify-failure:
    needs: restart
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Alert
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: |
            ⚠️ <b>Wispbyte 任务运行失败</b>
            请检查 GitHub Actions 日志或确认 Cookie 是否失效。
            查看日志: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          format: markdown
