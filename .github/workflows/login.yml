name: Wispbyte Smart Auto-Sync

on:
  schedule:
    # 每3天在 UTC 21:31 运行一次（北京时间凌晨 5:31）
    - cron: '31 21 * * *'
  workflow_dispatch: # 允许手动点击运行进行测试

jobs:
  wispbyte-task:
    runs-on: ubuntu-latest
    # 赋予 GITHUB_TOKEN 读取内容的权限
    permissions:
      contents: read
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --quiet aiohttp pynacl
          echo "✅ aiohttp 和 pynacl 加密库安装完成"

      - name: Run Smart Restart & Sync
        env:
          # 核心变量
          LOGIN_ACCOUNTS: ${{ secrets.LOGIN_ACCOUNTS }}
          # 自动回写权限变量
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # 通知变量
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "🚀 启动监控脚本..."
          python login.py
          echo "🏁 任务执行完毕"
