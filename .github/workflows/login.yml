name: Wispbyte Auto Login

on:
  schedule:
    - cron: '31 21 */3 * *'    # 每3天UTC 21点31分
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send Start Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: "*Wispbyte 任务已启动！*\n环境：真实 Chrome + Xvfb\n预计 8–12 分钟完成"
          format: markdown

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb  # 安装虚拟显示器支持

      - name: Install Python dependencies
        timeout-minutes: 8
        run: |
          echo "开始安装依赖..."
          pip install --quiet playwright aiohttp
          # 安装真实的 Google Chrome 浏览器及其依赖
          playwright install chrome --with-deps
          echo "依赖安装完成"

      - name: Run login script
        timeout-minutes: 10
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          LOGIN_ACCOUNTS: ${{ secrets.LOGIN_ACCOUNTS }}
        run: |
          echo "开始执行 login.py（使用 Xvfb 模拟显示器）"
          # 使用 xvfb-run 包装执行，-a 自动寻找可用显示端口
          xvfb-run -a python login.py && echo "login.py 成功完成" || echo "脚本执行失败"

  notify-failure:
    needs: login
    if: always() && (needs.login.result == 'cancelled' || needs.login.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Alert
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: "*GitHub Actions 异常*\n\n状态：`${{ needs.login.result }}`\n查看日志：\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          format: markdown
